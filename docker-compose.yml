services:
  opus-api:
    build: .
    container_name: opus-api
    command: uvicorn opus_clone.api.main:app --host 0.0.0.0 --port 8080 --workers 2
    env_file: .env
    ports:
      - "8080:8080"
    networks:
      - opus-net
    restart: unless-stopped

  opus-worker:
    build: .
    container_name: opus-worker
    command: dramatiq opus_clone.workers --processes 2 --threads 2
    env_file: .env
    networks:
      - opus-net
    restart: unless-stopped

  opus-scheduler:
    build: .
    container_name: opus-scheduler
    command: python -m opus_clone.scheduler
    env_file: .env
    networks:
      - opus-net
    restart: unless-stopped

  opus-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: opus-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - opus-net
    depends_on:
      - opus-api
    restart: unless-stopped

networks:
  opus-net:
    driver: bridge
